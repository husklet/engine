name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Crate version to publish
        required: true
        default: 0.1.0

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-26, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test engine
        run: nix flake check --print-build-logs

      - name: Test Linux compatibility
        if: runner.os == 'Linux'
        run: nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" test-linux-production-typed'

      - name: Test macOS compatibility
        if: runner.os == 'macOS'
        run: nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" e2e-compat'

      - name: Test macOS lifecycle
        if: runner.os == 'macOS'
        run: nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" e2e-lifecycle'

      - name: Package Rust crate
        run: nix develop --command cargo package --manifest-path pkgs/rust/Cargo.toml --locked --no-verify

  publish:
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - name: Verify release version
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pkgs/rust/Cargo.toml | head -1)
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            requested=${GITHUB_REF_NAME#v}
          else
            requested='${{ inputs.version }}'
          fi
          test "$requested" = "$version"

      - name: Publish Rust crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            nix develop --command cargo publish --manifest-path pkgs/rust/Cargo.toml --locked && exit 0
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
