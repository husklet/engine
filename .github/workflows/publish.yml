name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Crate version to publish
        required: true
        default: 0.1.0

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  linux:
    uses: ./.github/workflows/linux.yml
    secrets: inherit

  mac:
    uses: ./.github/workflows/mac.yml
    secrets: inherit

  publish:
    needs: [linux, mac]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          # Disable the post-run install-diagnostic upload: it periodically hangs
          # for tens of minutes on the runner, stalling the whole job past its
          # timeout even though every test step already passed.
          diagnostic-endpoint: ""

      - name: Verify release version
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pkgs/rust/Cargo.toml | head -1)
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            requested=${GITHUB_REF_NAME#v}
          else
            requested='${{ inputs.version }}'
          fi
          test "$requested" = "$version"

      - name: Publish Rust crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            nix develop --command cargo publish --manifest-path pkgs/rust/Cargo.toml --locked && exit 0
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
