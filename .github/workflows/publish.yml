name: Publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: Crate version to publish
        required: true
        default: 0.1.0

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# NOTE: the Linux and macOS test workflows and the archive-verification steps are
# intentionally NOT run here. This is a build -> publish only path, used to ship a
# release whose testing was already done on the branch. Validation lives in
# linux.yml / mac.yml on push; re-enable a `needs:` gate and verify steps to
# restore the full gated release.
jobs:
  publish:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          diagnostic-endpoint: ""

      - name: Verify release version
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pkgs/rust/Cargo.toml | head -1)
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            requested=${GITHUB_REF_NAME#v}
          else
            requested='${{ inputs.version }}'
          fi
          test "$requested" = "$version"

      # Build and publish only. cargo publish compiles (builds) the crate against
      # the committed archive, then uploads. No separate test steps. Retries with
      # backoff to ride out a transient crates.io upload outage.
      - name: Build and publish Rust crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            nix develop --command cargo publish --manifest-path pkgs/rust/Cargo.toml --locked && exit 0
            if [ "$attempt" -eq 8 ]; then
              exit 1
            fi
            sleep $((attempt * 20))
          done
