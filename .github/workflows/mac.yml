name: macOS

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: mac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.aarch64-darwin.package

      # The darwin `nix build` check above builds+installs only (doCheck = false in
      # flake.nix). The `make unit` and `make package-test` suites run the engine and
      # its host-service tests, which need resources the Nix build sandbox denies
      # (opening "/", scratch files under a fixed /tmp path, JIT execution of guest
      # binaries, and localhost DNS). Run them here, outside the sandbox, exactly like
      # the test-macos and compat steps below. Split into two steps so a failure's step
      # name identifies which suite regressed.
      # AR=ar forces the host (macOS) archiver: the dev shell exports AR pointing at
      # the linux cross-ar for the guest engine builds, which would otherwise archive
      # build/lib as a linux object and break linking of the host unit/package binaries.
      - name: Test C unit suite
        timeout-minutes: 25
        run: nix develop --command sh -c 'make -s -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" AR=ar unit'

      - name: Test C package integration
        timeout-minutes: 25
        run: nix develop --command sh -c 'make -s CC="$NATIVE_CC" AR=ar CODESIGN=/usr/bin/codesign package-test'

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.aarch64-darwin.rust

      - name: Test macOS host services
        timeout-minutes: 30
        # Runs unsandboxed (unlike the `nix build` package check) so the host-service
        # integration tests can open "/", "/tmp", and resolve localhost DNS.
        run: nix develop --command sh -c 'make -s -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" test-macos'

      - name: Test macOS compatibility
        timeout-minutes: 40
        shell: bash
        run: |
          set -o pipefail
          if ! nix develop --command sh -c 'make -s -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" e2e-compat' 2>&1 | tee runtime.log "$GITHUB_STEP_SUMMARY"; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=macOS runtime compatibility failed::$message"
            exit 1
          fi

      - name: Run e2e gates
        timeout-minutes: 30
        run: nix develop --command sh -c 'make -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" e2e-mac-gates'

      - name: Package Rust crate
        timeout-minutes: 20
        run: nix develop --command cargo build --release --locked --manifest-path pkgs/rust/Cargo.toml
