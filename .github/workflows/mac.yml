name: macOS

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: mac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Core build + host-service + gates. Fast (~30-40min); no compat corpus here.
  mac:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          # Disable the post-run install-diagnostic upload: it periodically hangs
          # for tens of minutes on the runner, stalling the whole job past its
          # timeout even though every test step already passed.
          diagnostic-endpoint: ""
      - uses: nix-community/cache-nix-action@v7
        with:
          # Keyed on flake.lock ONLY, deliberately. The expensive content of this cache is the guest
          # toolchains -- notably the x86_64 musl cross gcc that pkgsStatic.sqlite implies, which
          # nixpkgs does not serve prebuilt for an aarch64 builder and which takes tens of minutes to
          # build from source. Hashing flake.nix too meant every edit to it discarded that toolchain
          # and rebuilt the compiler, even for edits that cannot change the toolchain at all.
          # flake.lock is what pins the nixpkgs those toolchains come from.
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.aarch64-darwin.package

      # doCheck=false on darwin, so run the runtime suites unsandboxed here (they need "/",
      # "/tmp", JIT, localhost DNS). AR=ar forces the host archiver over the dev-shell cross-ar.
      - name: Test C unit suite
        timeout-minutes: 25
        run: nix develop --command sh -c 'make -s -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" AR=ar unit'

      - name: Test C package integration
        timeout-minutes: 25
        run: nix develop --command sh -c 'make -s CC="$NATIVE_CC" AR=ar CODESIGN=/usr/bin/codesign package-test'

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.aarch64-darwin.rust

      - name: Test macOS host services
        timeout-minutes: 30
        shell: bash
        run: |
          set -o pipefail
          # The native host-services tests (fork-after-Foundation-init, DNS/resolver) are deterministic
          # on a real host (90/90 in a local loop) but occasionally fail env-specifically on the
          # sandboxed/SIP-on macos-26 runner. Surface the failing tail and retry once so transient
          # runner divergence self-heals; a consistent failure still fails both attempts. Per-binary
          # 180s timeouts (Makefile) already bound any hang and name the culprit.
          # Redirect to a FILE and bound with `timeout` -- never pipe. tee waits for EOF, which only
          # arrives once every process holding the pipe's write end exits; guest/engine processes that
          # outlive a suite inherit this step's stdout, so a finished run could hang indefinitely (the
          # Linux compat step sat in exactly this state for over nine hours). See linux.yml.
          run_tm() {
            local st=0
            timeout --signal=TERM --kill-after=60s 22m \
              nix develop --command sh -c 'make -s -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" test-macos' \
              >"$1" 2>&1 </dev/null || st=$?
            tail -n 60 "$1"
            return $st
          }
          if ! run_tm tm.log; then
            warn=$(tail -c 1500 tm.log); warn=${warn//'%'/'%25'}; warn=${warn//$'\n'/'%0A'}; warn=${warn//$'\r'/'%0D'}
            echo "::warning title=test-macos failed attempt 1 — retrying::$warn"
            if ! run_tm tm.log; then
              message=$(tail -c 1500 tm.log); message=${message//'%'/'%25'}; message=${message//$'\n'/'%0A'}; message=${message//$'\r'/'%0D'}
              echo "::error title=test-macos failed (both attempts)::$message"
              exit 1
            fi
          fi

      - name: Run e2e gates
        timeout-minutes: 30
        run: nix develop --command sh -c 'make -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" e2e-mac-gates'

      - name: Package Rust crate
        timeout-minutes: 20
        run: nix develop --command cargo build --release --locked --manifest-path pkgs/rust/Cargo.toml

  # Runtime compatibility suites, split across parallel runners so wall-clock is the
  # slowest bucket (~20-25min) instead of the ~70min sequential `make e2e-compat`.
  # Each bucket builds compat-engines (a prereq of every compat-* target) then its suites.
  mac-compat:
    name: compat / ${{ matrix.name }}
    runs-on: macos-26
    timeout-minutes: 50
    strategy:
      fail-fast: false
      # `name` is what shows up in the checks list; `targets` is the make goal list.
      # Previously the raw goal list WAS the job name, producing entries like
      # "mac-compat (compat-abi compat-core compat-isa-x86-64 compat-completeness)".
      matrix:
        include:
          - name: abi-corpus
            targets: compat-abi-corpus
          - name: core
            targets: compat-abi compat-core compat-isa-x86-64 compat-completeness
          - name: net-ipc
            targets: compat-network compat-ipc compat-syscall compat-syscall-edges compat-libc
          - name: fs-proc
            targets: compat-filesystem compat-threads compat-memory compat-process compat-procfs
          - name: posix-signals
            targets: compat-isolation compat-posix compat-signals compat-soak compat-time
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          # Disable the post-run install-diagnostic upload: it periodically hangs
          # for tens of minutes on the runner, stalling the whole job past its
          # timeout even though every test step already passed.
          diagnostic-endpoint: ""
      - uses: nix-community/cache-nix-action@v7
        with:
          # Keyed on flake.lock ONLY, deliberately. The expensive content of this cache is the guest
          # toolchains -- notably the x86_64 musl cross gcc that pkgsStatic.sqlite implies, which
          # nixpkgs does not serve prebuilt for an aarch64 builder and which takes tens of minutes to
          # build from source. Hashing flake.nix too meant every edit to it discarded that toolchain
          # and rebuilt the compiler, even for edits that cannot change the toolchain at all.
          # flake.lock is what pins the nixpkgs those toolchains come from.
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Compat suites
        timeout-minutes: 45
        shell: bash
        run: |
          set -o pipefail
          # The compat cases run under `-j ncpu`; a few load-sensitive stress gates (e.g. the IPC
          # pump-primary-channel epoll->kqueue bring-up gate: 12000 jittered rounds + a liveness
          # watchdog) can exceed their timing bound on a heavily-contended macos-26 runner even though
          # they pass deterministically on a real host. Retry ONCE on failure so transient runner
          # contention self-heals; a genuine/consistent break still fails both attempts. The first-try
          # failure is surfaced as a ::warning (never silently swallowed) so a real intermittent bug
          # stays visible for follow-up even when the retry greens the job.
          # File, not pipe, plus an external bound -- see the note in linux.yml: a process that outlives
          # the suite keeps a pipe's write end open, so tee never sees EOF and the step hangs forever.
          run_bucket() {
            local st=0
            timeout --signal=TERM --kill-after=60s 40m \
              nix develop --command sh -c 'make -sk -j"$(sysctl -n hw.ncpu)" CC="$NATIVE_CC" ${{ matrix.targets }}' \
              >"$1" 2>&1 </dev/null || st=$?
            tail -c 200000 "$1" >> "$GITHUB_STEP_SUMMARY" || true
            tail -n 60 "$1"
            return $st
          }
          if ! run_bucket runtime.log; then
            warn=$(tail -c 1200 runtime.log); warn=${warn//'%'/'%25'}; warn=${warn//$'\n'/'%0A'}; warn=${warn//$'\r'/'%0D'}
            echo "::warning title=macOS compat (${{ matrix.name }}) failed attempt 1 — retrying::$warn"
            if ! run_bucket runtime.log; then
              message=$(tail -c 1500 runtime.log)
              message=${message//'%'/'%25'}
              message=${message//$'\n'/'%0A'}
              message=${message//$'\r'/'%0D'}
              echo "::error title=macOS compat (${{ matrix.name }}) failed (both attempts)::$message"
              exit 1
            fi
          fi
