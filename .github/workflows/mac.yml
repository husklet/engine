name: macOS

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: mac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mac:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.aarch64-darwin.package

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.aarch64-darwin.rust

      - name: Test macOS compatibility
        shell: bash
        run: |
          set -o pipefail
          if ! nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" e2e-compat' 2>&1 | tee runtime.log "$GITHUB_STEP_SUMMARY"; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=macOS runtime compatibility failed::$message"
            exit 1
          fi

      - name: Package Rust crate
        run: nix develop --command cargo build --release --locked --manifest-path pkgs/rust/Cargo.toml

  mac-gates:
    strategy:
      fail-fast: false
      matrix:
        include:
          - build: e2e-mac-build-signal
            test: e2e-lifecycle-signal
          - build: e2e-mac-build-control
            test: e2e-lifecycle-control
          - build: e2e-mac-build-hygiene
            test: e2e-lifecycle-hygiene
          - build: e2e-mac-build-fd
            test: e2e-embedding-fd
          - build: e2e-mac-build-stdio
            test: e2e-embedding-stdio
          - build: e2e-mac-build-dir
            test: e2e-embedding-dir
    name: macOS ${{ matrix.test }}
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v20
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
      - name: Build and sign artifacts
        run: nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" ${{ matrix.build }}'
      - name: Run isolated firewall gate
        run: nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" ${{ matrix.test }}'
