name: Linux

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          # Disable the post-run install-diagnostic upload: it periodically hangs
          # for tens of minutes on the runner, stalling the whole job past its
          # timeout even though every test step already passed.
          diagnostic-endpoint: ""

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.aarch64-linux.package

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.aarch64-linux.rust

      - name: Test Linux compatibility
        timeout-minutes: 30
        shell: bash
        run: |
          set -o pipefail
          # The typed compat scratch is mapped as the guest's /tmp; on this ext4
          # runner it must be tmpfs-backed for statx-btime/memfd-seals to behave.
          sudo mkdir -p /mnt/hl-scratch && sudo mount -t tmpfs -o size=4G tmpfs /mnt/hl-scratch && sudo chmod 1777 /mnt/hl-scratch
          export HL_MATRIX_SCRATCH_DIR=/mnt/hl-scratch
          if ! nix develop --command sh -c 'make -s -j"$(nproc)" CC="$NATIVE_CC" test-linux-production-typed' 2>&1 | tee runtime.log "$GITHUB_STEP_SUMMARY"; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=Linux runtime compatibility failed::$message"
            exit 1
          fi

      # The CMake build is being brought up as the standard build path to replace
      # the hand-written Makefile. Gating it here keeps it honest: it must
      # configure, build, pass the unit suite via CTest, and produce an
      # installable SDK on every push, so it cannot silently rot while `make`
      # remains authoritative. The source lists are duplicated between the two
      # builds today, so this step is what catches drift.
      - name: Test CMake build (configure, build, ctest, install)
        timeout-minutes: 30
        run: |
          nix develop --command sh -c '
            set -e
            cmake -G Ninja -B build-ci -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/aarch64-linux.cmake
            ninja -C build-ci
            ctest --test-dir build-ci -L unit --output-on-failure
            cmake --install build-ci --prefix "$PWD/build-ci-sdk"
            test -f build-ci-sdk/lib/libhl-engine.a
            test -f build-ci-sdk/lib/pkgconfig/hl-engine.pc
            test -x build-ci-sdk/bin/hl-engine-runner
          '

      - name: Package Rust crate
        run: nix develop --command cargo build --release --locked --manifest-path pkgs/rust/Cargo.toml
