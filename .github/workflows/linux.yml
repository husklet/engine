name: Linux

on:
  pull_request: {}
  push:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: linux-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20
        with:
          # Disable the post-run install-diagnostic upload: it periodically hangs
          # for tens of minutes on the runner, stalling the whole job past its
          # timeout even though every test step already passed.
          diagnostic-endpoint: ""

      - uses: nix-community/cache-nix-action@v7
        with:
          # Keyed on flake.lock ONLY, deliberately. The expensive content of this cache is the guest
          # toolchains -- notably the x86_64 musl cross gcc that pkgsStatic.sqlite implies, which
          # nixpkgs does not serve prebuilt for an aarch64 builder and which takes tens of minutes to
          # build from source. Hashing flake.nix too meant every edit to it discarded that toolchain
          # and rebuilt the compiler, even for edits that cannot change the toolchain at all.
          # flake.lock is what pins the nixpkgs those toolchains come from.
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      # Granular steps rather than one `nix flake check` so a failure names the
      # thing that broke instead of "check failed". Together these are exactly
      # the four checks `nix flake check` runs.
      - name: Check formatting
        run: nix build --print-build-logs .#checks.aarch64-linux.format

      - name: Test C package
        run: nix build --print-build-logs .#checks.aarch64-linux.package

      - name: Test unit suite (CMake/CTest)
        run: nix build --print-build-logs .#checks.aarch64-linux.unit

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.aarch64-linux.rust

      - name: Test Linux compatibility
        timeout-minutes: 30
        shell: bash
        run: |
          set -o pipefail
          # The typed compat scratch is mapped as the guest's /tmp; on this ext4
          # runner it must be tmpfs-backed for statx-btime/memfd-seals to behave.
          sudo mkdir -p /mnt/hl-scratch && sudo mount -t tmpfs -o size=4G tmpfs /mnt/hl-scratch && sudo chmod 1777 /mnt/hl-scratch
          export HL_MATRIX_SCRATCH_DIR=/mnt/hl-scratch
          # Redirect to a FILE, never through a pipe, and bound the run with `timeout`.
          #
          # This used to be `... | tee runtime.log "$GITHUB_STEP_SUMMARY"`. tee reads until EOF on that
          # pipe, and EOF only arrives once EVERY process holding its write end exits. The compat suite
          # deliberately leaves such processes alive -- pc-forkoutlive exists precisely to have a child
          # outlive its parent, and the fork-server/supervisor are long-lived -- and they inherit this
          # step's stdout. So make would finish and tee would keep waiting: one run sat in this step for
          # over NINE HOURS. `timeout-minutes` did not save it because GitHub enforces that runner-side.
          # A file has no reader to block, so an orphan holding the fd costs nothing.
          status=0
          timeout --signal=TERM --kill-after=60s 25m \
            nix develop --command sh -c 'make -s -j"$(nproc)" CC="$NATIVE_CC" test-linux-production-typed' \
            >runtime.log 2>&1 </dev/null || status=$?
          tail -c 200000 runtime.log >> "$GITHUB_STEP_SUMMARY" || true
          tail -n 60 runtime.log
          if [ "$status" -ne 0 ]; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            if [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; then
              echo "::error title=Linux runtime compatibility TIMED OUT after 25m::$message"
            else
              echo "::error title=Linux runtime compatibility failed::$message"
            fi
            exit 1
          fi

      # The CMake build is being brought up as the standard build path to replace
      # the hand-written Makefile. Gating it here keeps it honest: it must
      # configure, build, pass the unit suite via CTest, and produce an
      # installable SDK on every push, so it cannot silently rot while `make`
      # remains authoritative. The source lists are duplicated between the two
      # builds today, so this step is what catches drift.
      - name: Test CMake build (configure, build, ctest, install)
        timeout-minutes: 30
        run: |
          nix develop --command sh -c '
            set -e
            cmake -G Ninja -B build-ci
            ninja -C build-ci
            ctest --test-dir build-ci -L unit --output-on-failure
            cmake --install build-ci --prefix "$PWD/build-ci-sdk"
            test -f build-ci-sdk/lib/libhl-engine.a
            test -f build-ci-sdk/lib/pkgconfig/hl-engine.pc
            test -x build-ci-sdk/bin/hl-engine-runner
          '

      - name: Package Rust crate
        run: nix develop --command cargo build --release --locked --manifest-path pkgs/rust/Cargo.toml
