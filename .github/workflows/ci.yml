name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            nix_system: aarch64-darwin
          - runner: ubuntu-24.04-arm
            nix_system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.${{ matrix.nix_system }}.package

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.${{ matrix.nix_system }}.rust

      - name: Test Linux compatibility
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          if ! nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" test-linux-production-typed' 2>&1 | tee runtime.log "$GITHUB_STEP_SUMMARY"; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=Linux runtime compatibility failed::$message"
            exit 1
          fi

      - name: Test macOS compatibility
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -o pipefail
          if ! nix develop --command sh -c 'make -s -j2 CC="$NATIVE_CC" e2e-compat' 2>&1 | tee runtime.log "$GITHUB_STEP_SUMMARY"; then
            message=$(tail -c 1500 runtime.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=macOS runtime compatibility failed::$message"
            exit 1
          fi

      - name: Package Rust crate
        run: nix develop --command cargo package --manifest-path pkgs/rust/Cargo.toml --locked --no-verify
