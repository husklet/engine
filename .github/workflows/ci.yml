name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            nix_system: aarch64-darwin
          - runner: ubuntu-24.04-arm
            nix_system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v20

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Test C package
        run: nix build --print-build-logs .#checks.${{ matrix.nix_system }}.package

      - name: Test Rust package
        run: nix build --print-build-logs .#checks.${{ matrix.nix_system }}.rust

      - name: Test Linux compatibility
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -o pipefail
          nix develop --command make -s -j2 test-linux-production-typed 2>&1 | tee "$GITHUB_STEP_SUMMARY"

      - name: Test macOS compatibility
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -o pipefail
          nix develop --command make -s -j2 e2e-compat 2>&1 | tee "$GITHUB_STEP_SUMMARY"

      - name: Package Rust crate
        run: nix develop --command cargo package --manifest-path pkgs/rust/Cargo.toml --locked --no-verify
